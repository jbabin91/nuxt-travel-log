# Coolify's Nixpacks pins corepack@0.24.1, which cannot launch pnpm 11 on Node 24
# (ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING). Install the pinned pnpm directly instead.
# Keep the pnpm version in sync with package.json's "packageManager" field.
[phases.install]
cmds = [
  "npm install -g pnpm@11.7.0",
  "pnpm install --frozen-lockfile",
]
